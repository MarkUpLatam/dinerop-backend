spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5        # subido de 3 → 5
      minimum-idle: 2             # subido de 1 → 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: DineropHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20          # mejora inserts en lote
        order_inserts: true
        order_updates: true

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 50                     # subido de 20 → 50
      min-spare: 10               # subido de 5 → 10
    max-connections: 200          # subido de 100 → 200
    accept-count: 100             # subido de 50 → 100
    connection-timeout: 20000

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:28800000}

logging:
  level:
    org.hibernate.SQL: warn
    root: warn

cors:
  allowed-origins: https://www.dinerop.com,https://dinerop.com,https://markup-landing.vercel.app,https://dinerup-app.vercel.app

resend:
  api-key: ${RESEND_API_KEY}
  from-email: dinerop@dinerop.com

app:
  frontend-url: ${FRONTEND_URL}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
