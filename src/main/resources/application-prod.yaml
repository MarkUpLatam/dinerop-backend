spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: DineropHikariPool
      # Validar conexión antes de usarla (evita errores si la BD cierra la conexión)
      connection-test-query: SELECT 1
      keepalive-time: 30000

  jpa:
    hibernate:
      # validate: solo verifica el esquema, no lo modifica → arranque mucho más rápido
      # update: úsalo solo cuando agregues tablas/columnas nuevas, luego vuelve a validate
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        # Reduce tiempo de arranque: no genera estadísticas
        generate_statistics: false

server:
  port: ${PORT:8080}
  # Tiempo que Railway espera antes del healthcheck (~60s para que Spring Boot arranque)
  tomcat:
    threads:
      max: 50
      min-spare: 10
    max-connections: 200
    accept-count: 100
    connection-timeout: 20000

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:28800000}

logging:
  level:
    # info en root para VER errores de arranque en los logs de Railway
    root: info
    # silenciamos los más verbosos
    org.hibernate.SQL: warn
    org.hibernate.type: warn
    com.zaxxer.hikari: warn
    org.springframework.web: warn

cors:
  allowed-origins: https://www.dinerop.com,https://dinerop.com,https://markup-landing.vercel.app,https://dinerup-app.vercel.app

resend:
  api-key: ${RESEND_API_KEY}
  from-email: dinerop@dinerop.com

app:
  frontend-url: ${FRONTEND_URL}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      # Healthcheck responde aunque la BD tarde en conectar
      probes:
        enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: false
