spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3        # reducido — cada conexión consume ~5MB
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1200000
      pool-name: DineropHikariPool
      connection-test-query: SELECT 1
      keepalive-time: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 10          # reducido de 20 → 10
        order_inserts: true
        order_updates: true
        generate_statistics: false

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 20                     # reducido de 50 → 20 (cada thread ~1MB de stack)
      min-spare: 5                # reducido de 10 → 5
    max-connections: 100          # reducido de 200 → 100
    accept-count: 50
    connection-timeout: 20000

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:28800000}

logging:
  level:
    root: warn
    com.markup.dinerop: info
    org.hibernate.SQL: warn
    com.zaxxer.hikari: warn

cors:
  allowed-origins: https://www.dinerop.com,https://dinerop.com,https://markup-landing.vercel.app,https://dinerup-app.vercel.app

resend:
  api-key: ${RESEND_API_KEY}
  from-email: dinerop@dinerop.com

app:
  frontend-url: ${FRONTEND_URL}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
